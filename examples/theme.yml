#     font_style: bold  # bold, italic, bold_italic
#     font_color: ""

# -- Sidebar blocks -----------------------------------------------------------
# sidebar:
#   background_color: ""
#   border_color: ""
#   border_width: 0
#   font_color: ""
#   font_size: 0

# -- Example blocks -----------------------------------------------------------
# example:
#   background_color: ""
#   border_color: ""
#   border_width: 0
#   font_color: ""
#   font_size: 0

# -- Captions (figure / table) -----------------------------------------------
# caption:
#   font_size: 0        # defaults to code font size
#   font_style: italic  # bold, italic, bold_italic
#   font_color: ""
#   font_family: ""
#   text_align: ""      # left, center, right

# -- Description lists -------------------------------------------------------
# description_list:
#   term_font_style: bold  # bold, italic, bold_italic
#   term_font_color: ""
#   term_font_family: ""   # defaults to heading font if set
#   term_font_size: 0

