<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Lexend:wght@300..700&family=JetBrains+Mono:wght@400;500;700&display=optional" rel="stylesheet">
  {{range .CSS}}<link rel="stylesheet" href="{{$.BasePath}}{{.}}">
  {{end -}}
</head>
<body>
  <div class="site-layout">
    <input type="checkbox" id="nav-toggle" class="nav-toggle-input">
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>
    <nav>
      <div class="site-title"><a href="{{.BasePath}}index.html">libasciidoc</a></div>
      {{template "navtree" .Nav}}
    </nav>
    <main>
      <h1>{{.Title}}</h1>
      {{.Content}}
      <div class="site-footer">
        Built with <a href="https://github.com/lukewilliamboswell/libasciidoc">ascii2html</a>
      </div>
    </main>
  </div>
</body>
</html>

{{define "navtree"}}<ul>
{{range .Children}}<li{{if .Active}} class="active"{{end}}><a href="{{.Href}}">{{.Title}}</a>
{{if .Children}}{{template "navtree" .}}{{end}}</li>
{{end}}</ul>{{end}}
