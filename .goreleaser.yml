version: 2

builds:
  - id: ascii2doc
    main: ./cmd/ascii2doc
    binary: ascii2doc
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: ascii2html
    main: ./cmd/ascii2html
    binary: ascii2html
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
