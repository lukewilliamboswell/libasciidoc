codecov:
  notify:
    require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        target: 69%
        threshold: 2%
    patch:
      default:
        target: auto
  precision: 2
  round: down

comment:
  layout: "header, diff"
  behavior: default
  require_changes: no

ignore:
  - "internal/parser/parser.go"   # generated PEG parser — not hand-written
  - "internal/codegen/**"          # parser code-generator tool, not library
  - "internal/testsupport/**"      # test helper infrastructure
  - "cmd/**"                       # binary entry points (thin wrappers around internal/cli)