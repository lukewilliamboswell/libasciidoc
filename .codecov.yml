codecov:
  notify:
    require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: auto
  precision: 2
  round: down

comment:
  layout: "header, diff"
  behavior: default
  require_changes: no

ignore:
  - "pkg/parser/parser.go"