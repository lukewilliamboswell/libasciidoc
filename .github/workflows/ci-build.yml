name: ci-build
on:
  push:
    branches:
      - master
    tags-ignore:
      - '*.*'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Test ${{ matrix.os }} with Go ${{ matrix.go-version }}

    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check go mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Build
      run: go build ./...

    - name: Test
      run: go test -race ${{ runner.os == 'Linux' && '-coverprofile=coverage.txt -covermode=atomic' || '' }} ./...

    - name: Validate examples
      shell: bash
      run: |
        find examples -name '*.adoc' -print0 | while IFS= read -r -d '' f; do
          echo "checking: $f"
          go run ./cmd/ascii2html -o - "$f" > /dev/null
          go run ./cmd/ascii2doc -o - "$f" > /dev/null
        done

    - name: Upload coverage to Codecov
      if: runner.os == 'Linux'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.txt

  golangci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.1

  generate:
    name: Check generated code
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Run go generate
      run: go generate ./...

    - name: Check for uncommitted changes
      run: git diff --exit-code

  govulncheck:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

